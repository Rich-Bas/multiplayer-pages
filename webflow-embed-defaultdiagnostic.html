<!-- Webflow Embed for /defaultdiagnostic page -->
<!-- STEP: replace __USER__ and __REPO__ below with your GitHub username and repo name -->
<style>.mp-frame{width:100%;border:0;display:block;min-height:100vh;}</style>
<iframe
  id="mpFrameDiagnostic"
  class="mp-frame"
  src="https://__USER__.github.io/__REPO__/default-diagnostic.html"
  title="The Default Audit"
  loading="eager"
  referrerpolicy="no-referrer-when-downgrade"></iframe>
<script>
(function(){
  var f = document.getElementById('mpFrameDiagnostic');
  window.addEventListener('message', function(e){
    if(e.data && e.data.mpFrameHeight){ f.style.minHeight='0px'; f.style.height = e.data.mpFrameHeight + 'px'; }
  });
})();
</script>
